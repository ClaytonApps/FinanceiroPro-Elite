  .gradient-text {
    background: linear-gradient(90deg, #FFB800 0%, #FF6B00 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .gradient-bg { background: linear-gradient(135deg, #FFB800 0%, #FF6B00 100%); }
  .card { background: var(--bg-elevated); border: 1px solid var(--border); }
  .card-h:hover { border-color: var(--border-strong); }
  .input { background: #2a2a2a; border: 1px solid var(--border); color: #fff; }
  .input:focus { border-color: var(--primary-2); outline: none; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--primary-2); }
  .modal-overlay { backdrop-filter: blur(8px); background: rgba(0,0,0,0.7); }
  input, select, textarea { color-scheme: dark; }
  .pulse-orange { animation: pulseOrange 2s infinite; }
  @keyframes pulseOrange {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 107, 0, 0.7); }
    50% { box-shadow: 0 0 0 12px rgba(255, 107, 0, 0); }
  }
  .toast-in { animation: toastIn 0.25s ease-out; }
  @keyframes toastIn {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .pie-slice { transition: transform 0.2s; transform-origin: 50% 50%; }
  .pie-slice:hover { transform: scale(1.04); }
  #loader { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--primary); font-weight: 700; z-index: 100; font-family: 'Plus Jakarta Sans', sans-serif; }
  /* Light theme */
  body.light {
    --bg: #f5f5f7; --bg-elevated: #ffffff; --bg-hover: #f0f0f0;
    --border: #e5e5e7; --border-strong: #d1d1d6;
    --text: #1c1c1e; --text-muted: #48484a; --text-dim: #8e8e93;
  }
  body.light .input { background: #fafafa; }
  body.light .modal-overlay { background: rgba(255,255,255,0.6); }
  /* Safe areas iOS */
  .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
  /* Tabs */
  .tab-btn { color: var(--text-dim); }
  .tab-btn.active { color: var(--primary); }
  .tab-btn.active .tab-indicator { background: linear-gradient(90deg, #FFB800, #FF6B00); }
</style>

        onSave:salvar, onClose:function(){setShowForm(false);setEditing(null);}}),
      showCats && h(CategoriasManager,{
        categorias:categorias, onAdd:addCategoria, onRemove:removeCategoria,
        onClose:function(){setShowCats(false);}}),
      showSettings && h(Settings,{
        transacoes:transacoes, categorias:categorias, carteiras:carteiras, meta:meta, theme:theme,
        setTransacoes:setTransacoes, setCategorias:setCategorias, setCarteiras:setCarteiras,
        setMeta:setMeta, setTheme:setTheme, toast:toastMgr.push,
        openMetaEditor:function(){ setShowSettings(false); setShowMetaEditor(true); },
        openDemo:function(){ setShowSettings(false); save("fp_skip_demo", false); setShowOnboarding(true); },
        onClose:function(){setShowSettings(false);}}),
      showMetaEditor && h(MetaEditor,{
        meta:meta, setMeta:setMeta, toast:toastMgr.push,
        onClose:function(){setShowMetaEditor(false);}}),
      showVoice && h(VoiceCapture,{
        categorias:categorias,
        onCapture:function(parsed){
          setEditing({
            tipo: parsed.tipo, categoria: parsed.categoria,
            descricao: parsed.descricao, valor: parsed.valor || "",
            data: parsed.data, carteira: carteiras[0].id
          });
          setShowForm(true);
          toastMgr.push("Captura por voz reconhecida!","success");
        },
        onClose:function(){setShowVoice(false);}}),
      showOnboarding && h(Onboarding,{onDone:function(dontShowAgain){
        setShowOnboarding(false);
        if (dontShowAgain) save("fp_skip_demo", true);
      }}),
      h(ToastContainer,{toasts:toastMgr.toasts})
    );
  }
  var manifest = {
    name: "FinanceiroPro Elite", short_name: "FP Elite",
    start_url: ".", display: "standalone",
    background_color: "#1a1a1a", theme_color: "#FF6B00",
    icons: [{
      src: "data:image/svg+xml;base64,"+btoa('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFB800"/><stop offset="100%" stop-color="#FF6B00"/></linearGradient></defs><rect width="192" height="192" rx="40" fill="url(#g)"/><path d="M50 90v40h90v-30h-30a10 10 0 0 1 0-20h30v-30H60a10 10 0 0 0 0 20" fill="#1a1a1a"/></svg>'),
      sizes: "192x192", type: "image/svg+xml"
    }]
  };
  var mBlob = new Blob([JSON.stringify(manifest)],{type:"application/json"});
  var mLink = document.createElement("link");
  mLink.rel = "manifest"; mLink.href = URL.createObjectURL(mBlob);
  document.head.appendChild(mLink);

  var loader = document.getElementById("loader");
  if (loader) loader.remove();
  ReactDOM.createRoot(document.getElementById("root")).render(h(App));
})();
</script>
